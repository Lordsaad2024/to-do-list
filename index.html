<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="logic.js" defer></script>
    <link rel="shortcut icon" href="list.ico" type="image/x-icon">
    <title>To Do List</title>
</head>
<body>
    <main>
        <div class="container">
            <div class="to-do-list">
                <div class="header">
                    <h1>To Do List</h1>
                    <img src="list.ico" alt="TO DO ICON" title="TO DO ICON">
                </div>
                <div class="inputs">
                    <input type="text" id="to-do" placeholder="Add a task">
                    <button id="btn-add">Add</button>
                </div>
                <div class="status-tasks">
                    <button id="all-tasks">All Tasks</button>
                    <button id="complete-tasks">Complete Tasks</button>
                    <button id="uncomplete-tasks">Uncomplete tasks</button>
                </div>
                <ul id="tasks"></ul>
            </div>
           
        </div>
    </main>
    
</body>
</html>
